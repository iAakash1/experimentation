# PlantDx — Qwen2.5-VL-7B-Instruct-4bit QLoRA fine-tune on MANGO leaf captions.
# Target hardware: Apple Silicon M4 Pro, 24 GB unified memory, MLX / mlx-vlm / Metal.
#
# This is the single source of truth for one training run. It composes a model
# spec (configs/models/) and a LoRA method (configs/lora/) by name; either can be
# overridden inline with a `model_override:` / `lora_override:` mapping.
#
# Crop-agnostic pipeline reuse of configs/train/qwen25vl_tomato.yaml — only
# crop-specific values differ (crop, classes, image_glob, instructions_path,
# run_name; output dirs auto-derive from run_name). LoRA/QLoRA, optimizer,
# schedule, and checkpoint/logging cadence are byte-identical to the tomato run.
run_name: qwen25vl_mango_qlora

backend: mlx_vlm
seed: 20260711
grad_checkpoint: true          # trade compute for memory (recommended at 24 GB)

model: qwen25vl                # -> configs/models/qwen25vl.yaml
lora: qlora                    # -> configs/lora/qlora.yaml

optim:
  learning_rate: 1.0e-4
  min_learning_rate: 1.0e-6
  warmup_steps: 100
  scheduler: cosine
  grad_clip: 1.0
  batch_size: 1                # 24 GB: keep the micro-batch at 1
  gradient_accumulation_steps: 8   # effective batch size = 8
  epochs: 1
  weight_decay: 0.0

data:
  crop: mango
  classes:
    - healthy
    - anthracnose
    - bacterial_canker
    - cutting_weevil
    - die_back
    - gall_midge
    - powdery_mildew
    - sooty_mould
  processed_dir: datasets                      # datasets/mango/processed/<class>/
  corpus_path: artifacts/corpus/captions.jsonl # frozen response pool (crop-independent)
  captions_per_image: 1        # (image, instruction, caption) rows per image
  max_captions_per_disease: 200
  response_format: qa          # {"image","question","answer"} rows for mlx-vlm
  train_ratio: 0.90
  val_ratio: 0.05
  test_ratio: 0.05
  split_seed: 20260711
  image_glob: "*.jpg"          # MangoLeafBD is lowercase .jpg (PlantVillage tomato is .JPG)
  instructions_path: assets/training/instructions_mango.json  # "mango leaf" wording

checkpoint:
  steps_per_save: 200          # also keeps best + latest
  keep_last: 3
  keep_best: true
  resume: false                # set true to resume from checkpoints/<run_name>

logging:
  steps_per_report: 10
  steps_per_eval: 200
  val_batches: 8
  tensorboard: false           # CSV/JSON/Markdown always written; TB optional
