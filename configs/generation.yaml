# =============================================================================
# PlantDx — caption generation configuration
# =============================================================================
# Authoritative defaults from caption_framework/06_folder_structure_spec.md §4
# and 00_methodology_overview.md §7 (diversity) / §9 (config surface).
# Do NOT introduce magic numbers in code; every tunable lives here.
# =============================================================================

generation:
  global_seed: 20260711
  captions_per_image: 3            # K (doc 00 §7.6)
  balance_mode: per_image_fixed    # per_image_fixed | per_class_target
  t_class: null                    # target captions per class (only if per_class_target)
  max_attempts: 8                  # regeneration budget before minimal fallback (doc 03 §4)
  max_adjectives: 3                # modifier-stack depth cap (doc 01 §7.3)
  hedging_probability: 0.9         # prob. a secondary sign is hedged (keep high; doc 00 §5)
  severity_conditioned: false      # NEVER true unless per-image severity labels exist (doc 00 §5)
  epsilon_coverage: 0.30           # coverage-guided sampler epsilon (doc 00 §7.2)

  # Global target style mix (jittered per image). doc 02 §6.
  style_distribution:
    short: 0.18
    single_sentence: 0.26
    two_sentence: 0.22
    descriptive: 0.14
    clinical: 0.07
    educational: 0.07
    dense: 0.03
    long: 0.03

  # Instruction task-type mix. doc 04 §4.
  task_distribution:
    describe: 0.34
    identify: 0.14
    signs: 0.16
    color_qa: 0.08
    location_qa: 0.08
    crop_qa: 0.05
    differential: 0.10
    healthy_check: 0.05

  # Anti-domination / anti-overfitting caps. doc 00 §7.3.
  anti_domination:
    max_template_share: 0.08
    max_skeleton_share: 0.12
    max_opening_trigram_share: 0.15

# De-duplication. doc 00 §7.5.
dedup:
  jaccard_threshold: 0.90
  minhash_num_perm: 128
  shingle_size: 5

# Diversity acceptance gates (hard gates; a library failing any is rejected). doc 00 §7.7.
diversity_gates:
  distinct_1: 0.10
  distinct_2: 0.45
  distinct_3: 0.70
  self_bleu_max: 0.35
  concept_coverage: 1.0
  concept_pair_coverage: 0.90
  max_template_share: 0.08
  template_entropy_ratio: 0.85     # >= 0.85 * log2(#compatible templates)

# Dataset splits (by image; stratified). doc 04 §5.
splits:
  group_by: image
  stratify_by: disease_id
  train: 0.80
  val: 0.10
  test: 0.10
  seed: 20260711
  build_diagnostic_split: true     # confusable-pair held-out probe set
